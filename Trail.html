session_start();

    header("Location: login.php");
    exit();
}

$qr_id = $_GET['qr'];
$qr_images_dir = '../qr_images/';

$print_path = $qr_images_dir . $qr_id . '_print.png';
$web_path = $qr_images_dir . $qr_id . '.png';
$qr_image = null;

if(file_exists($print_path)) {
    $qr_image = $print_path;
} elseif(file_exists($web_path)) {
    $qr_image = $web_path;
}

if(!$qr_image) {
    die("QR code not found: " . $qr_id);
}

$site_url = "https://" . $_SERVER['HTTP_HOST'];
$qr_url = $site_url . "/qr_images/" . basename($qr_image);
