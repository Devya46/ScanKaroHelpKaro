<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Scan to Call - A5 Print</title>

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      /* PRINT SIZE */
      @page {
        size: A5 portrait;
        margin: 0;
      }

      body {
        margin: 0;
        background: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }

      /* A5 CARD */
      .container {
        width: 148mm;
        height: 210mm;
        background: #ffcd28;
        border: 4mm solid #fff;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .main {
        display: flex;
        padding: 10mm;
        gap: 10mm;
      }

      .qr-box {
        background: #fff;
        padding: 6mm;
      }

      .qr-box img {
        width: 60mm;
      }

      .content {
        flex: 1;
      }

      .title {
        font-size: 18pt;
        font-weight: bold;
      }

      .title span {
        color: #2a9df4;
        border-bottom: 3px solid #2a9df4;
      }

      .help {
        font-size: 20pt;
        font-weight: bold;
        margin-top: 5mm;
      }

      .help span {
        color: red;
      }

      .hindi {
        font-size: 14pt;
        font-weight: bold;
        margin-top: 8mm;
        text-align: center;
      }

      .icons img {
        width: 70mm;
        margin-top: 6mm;
      }

      .scan-box {
        background: #eee;
        padding: 3mm;
        border-radius: 10mm;
        font-size: 9pt;
        margin-top: 5mm;
        text-align: center;
      }

      .bottom {
        background: #fff;
        padding: 8mm;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .bottom .big {
        font-size: 16pt;
        font-weight: bold;
      }

      .bottom .small {
        font-size: 10pt;
        font-weight: bold;
        text-align: right;
      }

      /* REMOVE SCREEN SCALING */
      @media screen {
        body {
          display: flex;
          justify-content: center;
          background: #333;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="main">
        <div class="qr-box">
          <img src="Scanner.png" />
        </div>

        <div class="content">
          <div class="title">Scan <span>करो</span></div>

          <div class="help">
            <i class="fa fa-phone"></i>
            <span>Help</span> करो
          </div>

          <div class="hindi">
            स्मार्ट बनो, स्कैन करो,<br />
            वाहन चालक से बात करो
          </div>

          <div class="icons">
            <img src="icons.png" />
          </div>

          <div class="scan-box">
            SCAN USING PHONE CAMERA, GOOGLE LENS OR ANY OTHER SCANNER APP
          </div>
        </div>
      </div>

      <div class="bottom">
        <div class="big">SCAN TO CALL</div>
        <div class="small">
          Wrong Parking, Emergency Contact,<br />
          any issue with the vehicle, Scan the QR
        </div>
      </div>
    </div>
  </body>
</html>
