<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Scan Karo | Help Karo – Scan to Call</title>
    <!-- Font Awesome 6 (free icons) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000000; /* solid black background like reference */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Arial", "Helvetica", sans-serif;
        padding: 20px;
      }

      /* main card – exactly like image: bright yellow background, white border */
      .main-card {
        max-width: 1100px;
        width: 100%;
        background-color: #f5c518; /* vibrant yellow/gold */
        border: 6px solid #ffffff;
        box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3);
        position: relative;
      }

      /* two-column flex layout */
      .flex-row {
        display: flex;
        flex-wrap: wrap;
        padding: 28px 24px 24px 28px;
        gap: 30px;
      }

      /* left side: QR code block (white background) */
      .qr-block {
        background: #ffffff;
        padding: 16px 14px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.05);
      }
      .qr-block img {
        display: block;
        width: 270px;
        height: auto;
        max-width: 100%;
      }

      /* right content area */
      .right-content {
        flex: 1;
        position: relative;
      }

      /* main titles exactly matching: Scanकरो */
      .scan-headline {
        font-size: 58px;
        font-weight: 900;
        letter-spacing: -1px;
        line-height: 1.1;
        color: #000000;
      }
      .scan-headline span {
        color: #2a7fff; /* bright blue underline + color */
        border-bottom: 5px solid #2a7fff;
        display: inline-block;
        padding-bottom: 2px;
      }

      /* Helpकरो line */
      .help-line {
        font-size: 52px;
        font-weight: 800;
        margin-top: 8px;
        color: #000;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .help-line i {
        background: #ffffff;
        padding: 12px;
        border-radius: 50%;
        font-size: 40px;
        color: #e02222;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }
      .help-line .red-help {
        color: #d10000;
        font-weight: 800;
      }
      .help-line .karo-text {
        font-weight: 800;
      }

      /* Hindi tagline - smart bano scan karo */
      .hindi-tagline {
        font-size: 32px;
        font-weight: 700;
        margin-top: 20px;
        line-height: 1.35;
        color: #000;
      }

      /* three icon row (ban, car-crash, triangle-exclamation) */
      .icon-strip {
        display: flex;
        gap: 22px;
        margin: 22px 0 20px 0;
      }
      .icon-strip i {
        background: #ffffff;
        padding: 12px;
        border-radius: 50%;
        font-size: 28px;
        width: 54px;
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #222;
        transition: transform 0.1s ease;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }

      /* scanner app text box — rounded capsule */
      .scanner-note {
        background: #e9ecef;
        padding: 12px 24px;
        border-radius: 40px;
        font-weight: bold;
        font-size: 14px;
        letter-spacing: 0.5px;
        display: inline-block;
        color: #1a1a1a;
        font-family: monospace, "Courier New", monospace;
        box-shadow:
          inset 0 0 0 1px rgba(0, 0, 0, 0.05),
          0 1px 2px rgba(0, 0, 0, 0.05);
      }

      /* side rotated URLs (left and right) like in reference image */
      .rotated-url-left {
        position: absolute;
        bottom: 25px;
        left: -98px;
        transform: rotate(-90deg);
        transform-origin: left top;
        white-space: nowrap;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 1px;
        color: #1f2937;
        background: rgba(0, 0, 0, 0.05);
        padding: 4px 12px;
        border-radius: 30px;
        backdrop-filter: blur(2px);
        font-family: monospace;
      }
      .rotated-url-right {
        position: absolute;
        top: 40px;
        right: -102px;
        transform: rotate(90deg);
        transform-origin: right top;
        white-space: nowrap;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 1px;
        color: #1f2937;
        background: rgba(0, 0, 0, 0.05);
        padding: 4px 12px;
        border-radius: 30px;
        backdrop-filter: blur(2px);
        font-family: monospace;
      }

      /* bottom strip: darkish background with big SCAN TO CALL + description */
      .bottom-strip {
        background: #d9d9d9;
        padding: 20px 24px;
        text-align: center;
        border-top: 2px solid rgba(0, 0, 0, 0.1);
      }
      .bottom-strip .big-scan {
        font-size: 46px;
        font-weight: 900;
        letter-spacing: 2px;
        color: #000;
      }
      .bottom-strip .small-desc {
        font-size: 18px;
        font-weight: bold;
        margin-top: 8px;
        color: #111;
        line-height: 1.4;
      }

      /* responsive touches */
      @media (max-width: 880px) {
        .flex-row {
          padding: 20px;
          gap: 20px;
        }
        .qr-block img {
          width: 220px;
        }
        .scan-headline {
          font-size: 44px;
        }
        .help-line {
          font-size: 40px;
        }
        .help-line i {
          font-size: 30px;
          padding: 8px;
          width: auto;
          height: auto;
        }
        .hindi-tagline {
          font-size: 24px;
        }
        .icon-strip i {
          width: 46px;
          height: 46px;
          font-size: 24px;
        }
        .bottom-strip .big-scan {
          font-size: 34px;
        }
        .rotated-url-left,
        .rotated-url-right {
          font-size: 10px;
        }
        .rotated-url-left {
          left: -78px;
        }
        .rotated-url-right {
          right: -84px;
        }
      }

      @media (max-width: 680px) {
        .flex-row {
          flex-direction: column;
          align-items: center;
        }
        .right-content {
          width: 100%;
          text-align: center;
        }
        .icon-strip {
          justify-content: center;
        }
        .scanner-note {
          font-size: 12px;
          text-align: center;
        }
        .rotated-url-left,
        .rotated-url-right {
          display: none; /* hide rotated text on narrow screens to avoid overlap */
        }
        .bottom-strip .small-desc {
          font-size: 15px;
        }
      }

      /* ensure left/right positions relative to parent */
      .right-content {
        position: relative;
      }

      /* fine-tune for exact match spacing */
      .spacer-micro {
        margin-bottom: 4px;
      }
    </style>

    <!-- QR generation script to produce valid QR code with url "https://www.scankarohakaro.com" (exactly matching the prompt) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
      (function () {
        // make sure qr code generator is available
        if (typeof qrcode !== "undefined" || window.qrcode) {
          var QRCodeLib = window.qrcode || qrcode;
          // create QR code instance with error correction M
          var qr = QRCodeLib(0, "M");
          qr.addData("https://www.scankarohakaro.com");
          qr.make();
          var cellSize = 4;
          var margin = 4;
          var size = qr.getModuleCount();
          var canvasSize = (size + margin * 2) * cellSize;
          var canvas = document.getElementById("dynamicQR");
          if (canvas) {
            canvas.width = canvasSize;
            canvas.height = canvasSize;
            var ctx = canvas.getContext("2d");
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvasSize, canvasSize);
            ctx.fillStyle = "#000000";
            for (var row = 0; row < size; row++) {
              for (var col = 0; col < size; col++) {
                if (qr.isDark(row, col)) {
                  ctx.fillRect(
                    (col + margin) * cellSize,
                    (row + margin) * cellSize,
                    cellSize,
                    cellSize,
                  );
                }
              }
            }
            // add a small inner white dot? optional, but ensures clean look.
            // also set canvas style to be crisp
            canvas.style.width = "100%";
            canvas.style.height = "auto";
            canvas.style.maxWidth = "270px";
          }
        } else {
          // fallback in case library fails: show placeholder text
          var fallbackCanvas = document.getElementById("dynamicQR");
          if (fallbackCanvas) {
            var ctx = fallbackCanvas.getContext("2d");
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, 250, 250);
            ctx.fillStyle = "#000";
            ctx.font = "12px monospace";
            ctx.fillText("Scan QR: scankarohakaro.com", 20, 120);
          }
        }
      })();
    </script>
    <!-- ensure that on window load also regenerate -->
    <script>
      window.addEventListener("load", function () {
        if (typeof qrcode !== "undefined" || window.qrcode) {
          var QRCodeLib = window.qrcode || qrcode;
          if (QRCodeLib && document.getElementById("dynamicQR")) {
            var qr = QRCodeLib(0, "M");
            qr.addData("https://www.scankarohakaro.com");
            qr.make();
            var cellSize = 4;
            var margin = 4;
            var size = qr.getModuleCount();
            var canvasSize = (size + margin * 2) * cellSize;
            var canvas = document.getElementById("dynamicQR");
            canvas.width = canvasSize;
            canvas.height = canvasSize;
            var ctx = canvas.getContext("2d");
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvasSize, canvasSize);
            ctx.fillStyle = "#000000";
            for (var row = 0; row < size; row++) {
              for (var col = 0; col < size; col++) {
                if (qr.isDark(row, col)) {
                  ctx.fillRect(
                    (col + margin) * cellSize,
                    (row + margin) * cellSize,
                    cellSize,
                    cellSize,
                  );
                }
              }
            }
          }
        }
      });
    </script>
