<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scan to Call</title>

    <!-- Icons -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Edu+NSW+ACT+Cursive:wght@400..700&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inconsolata:wght@200..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+Devanagari:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+NZ+Basic:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        background: #000;
        font-family: Arial, Helvetica, sans-serif;
      }

      .container {
        max-width: 1100px;
        margin: 80px 22rem;
        background: #ffcd28;
        border: 6px solid #fff;
        position: relative;
      }

      /* MAIN GRID */
      .main {
        display: flex;
        padding: 20px;
        gap: 20px;
      }

      /* QR SECTION */
      .qr-box {
        background: #fff;
        padding: 10px;
        margin-left: 12px;
      }

      .qr-box img {
        width: 290px;
        height: auto;
        margin-top: 11px;
      }

      /* RIGHT CONTENT */
      .content {
        flex: 1;
        position: relative;
      }

      /* TITLE */
      .title {
        font-size: 60px;
        font-weight: 790;
      }
      .title span {
        position: relative;
        color: #3aa6ff; /* blue text */
      }

      /* underline effect */
      .title span::after {
        content: "";
        position: absolute;
        left: -130px;
        bottom: 8px;
        width: 14.5rem;
        height: 6px;
        background: #3aa6ff;
        border-radius: 9px;
        transform: skewX(-42deg);
      } /* gives that tilted feel */

      .title span {
        color: #2a9df4;
        -webkit-text-stroke:;
        font-family: "Noto Sans Devanagari", sans-serif;
        /* border-bottom: 4px solid #2a9df4; */
      }

      /* HELP LINE */
      .help {
        font-size: 54px;
        font-weight: 750;
        margin-top: 15px;
      }

      .help span {
        color: red;
        font-weight: 750;
      }
      .help .karo {
        color: #3aa6ff;
        -webkit-text-stroke:;
        font-size: 58px;
        font-family: "Noto Sans Devanagari", sans-serif;
      }

      .help i {
        margin-right: -14px;
        margin-left: 47px;
        font-size: 58px;
        transform: rotate(-60deg) translateY(-22%);
      }
      .small-img {
        width: 60px;
        vertical-align: middle;
        margin-left: 3px;
        margin-top: -10px;
      }

      /* HINDI TEXT */
      .hindi {
        font-size: 35px;
        margin-top: 26px;
        line-height: 1;
        text-align: center;
        margin-left: -34px;
        -webkit-text-stroke: 2px black;
        letter-spacing: 3.5px;
        font-family: "Noto Sans Devanagari", sans-serif;
      }
      .top-heading {
        line-height: 0.6;
        padding-top: 13px;
      }
      /* ICON ROW */
      .icons {
        margin-top: 15px;
        font-size: 28px;
        display: flex;
        gap: 20px;
      }
      .icons img {
        width: 236px;
        height: auto;
        margin-top: -11px;
        margin-bottom: 2px;
        align-items: center;
        margin-left: 5rem;
      }

      .icons i {
        background: #fff;
        padding: 10px;
        border-radius: 50%;
      }
      .Phone {
        width: 45px;
        height: 48px;
        margin-left: 23px;
      }

      /* SCAN TEXT BOX */
      .scan-box {
        background: #eee;
        padding: 3px 11px;
        margin: 0px 40px 1px 9px;
        border-radius: 30px;
        font-weight: bold;
        display: inline-block;
        font-size: 14px;
        text-align: center;
      }
      .top-heading {
        line-height: 0.6px;
      }

      /* SIDE TEXT */
      .side-left,
      .side-right {
        position: absolute;
        top: 50%;
        transform: rotate(-90deg) translateY(-50%);
        transform-origin: left top;
        font-size: 14px;
        font-weight: bold;
      }

      .side-left {
        position: absolute;
        right: 490px;
        top: 18rem;
        display: flex;
        align-items: center;
        gap: 8px; /* space between icon & text */
        font-size: 16px;
        background: none; /* no background */
      }

      .side-left i {
        font-size: 16px;
      }

      /* .side-right {
        left: 31rem;
        top: 0rem;
        transform: rotate(90deg) translateY(-50%);
        letter-spacing: 1px;
        font-size: 17px;
        text-decoration: underline;
      } */
      .side-right {
        position: fixed;
        left: 47.5rem;
        top: 29rem;
        transform: rotate(90deg) translateY(-50%);
        transform-origin: right top;
        background: #e6b80000;
        padding: 10px 20px;
        border-radius: 6px 6px 0 0;
        font-size: 16px;
        letter-spacing: 1px;
        text-decoration: underline;
      }

      .side-right p {
        margin: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .side-right i {
        font-size: 28px;
        color: red;
      }

      /* BOTTOM STRIP */
      .bottom {
        background: #fffcfc;
        padding: 15px 25px;

        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .bottom .big {
        font-size: 40px;
        font-weight: 600;
        white-space: nowrap;
      }

      .bottom .small {
        font-size: 18px;
        font-weight: 1000;
        line-height: 1.4;
        text-align: center;
        margin-right: 8px;
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .main {
          align-items: center;
        }
        .container {
          margin: 45px -9rem;
        }
        .qr-box {
          background: #fff;
          padding: 0px;
          margin-left: 132px;
        }
        .bottom .small {
          font-size: 10px;
          font-weight: 1000;
          line-height: 1.4;
          text-align: center;
          margin-right: -14px;
        }
        .title {
          font-size: 32px;
        }
        .side-left {
          position: absolute;
          right: 313px;
          top: 18rem;
          display: flex;
          align-items: center;
          gap: 8px;
          font-size: 14px;
          background: none;
        }

        .help {
          font-size: 28px;
        }

        .hindi {
          font-size: 20px;
        }

        .qr-box img {
          width: 220px;
        }

        .bottom .big {
          font-size: 24px;
          margin-left: 141px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="main">
        <!-- LEFT QR -->
        <div class="qr-box">
          <img src="saveascanner.png" alt="QR Code" />
        </div>

        <!-- RIGHT CONTENT -->
        <div class="content">
          <div class="top-heading">
            <div class="title">
              Scan<span> करो</span>
              <img class="small-img" src="Scanner.png" alt="" />
            </div>

            <div class="help">
              <!-- <i class="fa fa-volume-control-phone"></i> -->
              <img
                class="Phone"
                src="https://cdn-icons-png.flaticon.com/128/11081/11081337.png"
                alt=""
              />
              <span>Help</span> <span class="karo">करो</span>
            </div>
          </div>

          <div class="hindi">
            स्मार्ट बनो, स्कैन करो,<br />
            वाहन चालक से बात करो
          </div>

          <div class="icons">
            <img src="icons.png" style="padding-left: 16px" alt="IconsS" />
          </div>

          <div class="scan-box">
            SCAN USING PHONE CAMERA, GOOGLE LENS OR ANY OTHER SCANNER APP
          </div>

          <!-- SIDE TEXT -->
          <div class="side-left">
            <i class="fa-solid fa-globe"></i>
            <span>https://www.scankarohelpkaro.com</span>
          </div>

          <div class="side-right">
            <p>
              https://www.scankarohelpkaro.com
              <i
                class="fa fa-youtube-play"
                style="font-size: 38px; color: red"
              ></i>
            </p>
          </div>
        </div>
      </div>

      <!-- BOTTOM -->
      <div class="bottom">
        <div class="big">SCAN TO CALL</div>
        <div class="small">
          Wrong Parking, Emergency Contact,<br />
          any issue with the vehicle, Scan the QR
        </div>
      </div>
    </div>
  </body>
</html>
